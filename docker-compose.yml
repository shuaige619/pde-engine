version: "3.9"

networks:
  pde-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:

services:
  # PostgreSQL 16
  postgres:
    image: postgres:16-alpine
    container_name: pde-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: pde_user
      POSTGRES_PASSWORD: pde_password
      POSTGRES_DB: pde_engine
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - pde-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pde_user -d pde_engine"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Redis 7
  redis:
    image: redis:7-alpine
    container_name: pde-redis
    restart: unless-stopped
    command: redis-server --requirepass pde_redis_pass
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - pde-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "pde_redis_pass", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: pde-backend
    restart: unless-stopped
    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_URL: "postgresql://pde_user:pde_password@postgres:5432/pde_engine?schema=public"
      REDIS_URL: "redis://:pde_redis_pass@redis:6379"
      JWT_SECRET: "pde_jwt_secret_change_in_production"
      JWT_EXPIRES_IN: "7d"
      CORS_ORIGIN: "*"
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/app
      - /app/node_modules
      - /app/dist
    networks:
      - pde-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Frontend User Console (React)
  frontend-user:
    build:
      context: ./frontend-user
      dockerfile: Dockerfile
      target: development
    container_name: pde-frontend-user
    restart: unless-stopped
    environment:
      NODE_ENV: development
      VITE_API_BASE_URL: "http://localhost:3000"
    ports:
      - "5173:5173"
    volumes:
      - ./frontend-user:/app
      - /app/node_modules
    networks:
      - pde-network
    depends_on:
      - backend

  # Frontend Admin (Vue3)
  frontend-admin:
    build:
      context: ./frontend-admin
      dockerfile: Dockerfile
      target: development
    container_name: pde-frontend-admin
    restart: unless-stopped
    environment:
      NODE_ENV: development
      VITE_API_BASE_URL: "http://localhost:3000"
    ports:
      - "5174:5174"
    volumes:
      - ./frontend-admin:/app
      - /app/node_modules
    networks:
      - pde-network
    depends_on:
      - backend
